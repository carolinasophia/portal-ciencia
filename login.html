<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login - Portal Ciência</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0a0f2c, #1a1f4d);
    color: white;
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: rgba(0,0,0,0.4);
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 0 20px #00d4ff;
    width: 300px;
    text-align: center;
}

h1 {
    color: #00d4ff;
    text-shadow: 0 0 10px #00d4ff;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    outline: none;
}

button {
    width: 100%;
    padding: 10px;
    background: #00d4ff;
    border: none;
    border-radius: 8px;
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #00aacc;
}

a {
    color: #00d4ff;
    text-decoration: none;
    font-size: 14px;
}
</style>
</head>

<body>
<div class="container">
    <div class="card">
        <h1>Login</h1>

        <input type="email" placeholder="Email">
        <input type="password" placeholder="Senha">

        <button>Entrar</button>

        <p>Não tem conta? <a href="cadastro.html">Cadastre-se</a></p>
    </div>
</div>
</body>
</html>
